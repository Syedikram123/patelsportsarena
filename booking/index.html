<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking</title>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#f5f6fa;
  -webkit-user-select: none; /* Safari */
  -ms-user-select: none;     /* IE */
  user-select: none;         /* Standard */
}

/* HEADER */
.header{
  background:linear-gradient(135deg, #0f3d3e, #145a5a);
  color:#fff;
  padding:32px 15px 50px;
  text-align:center;
}

.logo{
  width:75px;
  height:75px;
  border-radius:100px;
  background:#fff;
  margin:auto;
  overflow:hidden;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.title{
  margin-top:10px;
  font-size:25px;
  font-weight:600;
}

.title1{
  margin-top:5px;
  font-size:20px;
  font-weight:400;
}

/* CARD */
.card{
  background:#fff;
  margin:-40px 10px 90px;
  border-radius:20px;
  padding:15px;
}

/* DATE */
.today{
  text-align:center;

  font-size:18px;
  font-weight:600;

  padding:10px;
  margin-bottom:15px;

  background:#fff;
  color:#145a5a;

  border-radius:50px;

  border:2px solid #e5e7eb;
}

/* SECTION */
.section{
  margin-top:15px;
}

.section h3{
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

.common{
  background:#e0f2fe;
  color:#0369a1;
}

.peak{
  background:#fff7ed;
  color:#b45309;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.slot{
  font-size:12px;
}

.time{
  margin-bottom:5px;
  font-weight:500;
}

.btns{
  display:flex;
  gap:5px;
}

.box{
  flex:1;
  padding:8px;
  border-radius:8px;
  text-align:center;
  border:2px solid #ccc;
  cursor:pointer;
}

.box.selected{
  background:#145a5a;
  color:#fff;
}

/* STICKY BAR */
.bottom-bar{
  position:fixed;
  bottom:5px;
  left:0;
  width:100%;
  background:#fff;
  padding:0px;
  box-shadow:0 -4px 10px rgba(0,0,0,0.1);
}

.summary{
  width:100%;                  /* full width */
  padding:5px 10px;

  font-size:15px;              /* bigger text */
  font-weight:600;

  background:#f1f5f9;          /* light clean bg */
  border-radius:12px;

  display:flex;
  justify-content:space-between; /* spread content */
  align-items:center;

  margin-bottom:10px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#145a5a;
  color:#fff;
  font-weight:600;
}

.slot{
  margin-bottom:10px;
}

.btn-row{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:20px;
  font-weight:600;
}

.confirm{
  background:#145a5a;
  color:#fff;
}

.clear{
  background:#e5e7eb;
  color:#000;
}

.btn:active{
  transform:scale(0.96);
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="../assets/psa.jpg">
  </div>
  <div class="title">Choose Your Game Slot</div>
</div>

<div class="card">

<div class="today" id="today"></div>

<!-- COMMON -->
<div class="section">
  <h3 class="common">Price - ₹400 / Hour (7 AM - 5 PM)</h3>
  <div class="grid" id="commonSlots"></div>
</div>

<!-- PEAK -->
<div class="section">
  <h3 class="peak">Price - ₹600 / Hour (5 PM - 11 PM)</h3>
  <div class="grid" id="peakSlots"></div>
</div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="summary" id="summary">
    Selected 0 slots | Total ₹0
  </div>

  <div class="btn-row">
    <button class="btn confirm" onclick="book()">Confirm</button>
    <button class="btn clear" onclick="clearAll()">Clear</button>
  </div>
</div>

<script>

// 📅 AUTO DATE
const d = new Date();
const options = { weekday: 'long', day: 'numeric', month: 'long' };
document.getElementById("today").innerText =
  d.toLocaleDateString('en-IN', options);

// DATA
let selected = [];

// CREATE SLOTS
function createSlots(){

  let commonHTML = "";
  let peakHTML = "";

  // COMMON (7AM–5PM)
for(let i=7;i<17;i++){
  commonHTML += slotBlock(i, 400);
}

// PEAK (5PM–11PM)
for(let i=17;i<23;i++){
  peakHTML += slotBlock(i, 600);
}

  document.getElementById("commonSlots").innerHTML = commonHTML;
  document.getElementById("peakSlots").innerHTML = peakHTML;
}

function formatTime(h){
  let ampm = h>=12 ? "PM" : "AM";
  let hr = h>12 ? h-12 : h;
  return hr + " " + ampm; 
}

function slotBlock(h, price){
  return `
  <div class="slot">
    <div class="time">${formatTime(h)} - ${formatTime(h+1)}</div>

    <div class="btns">
      <div class="box" onclick="select('${h}', 'Pitch 1', ${price}, this)">Pitch 1</div>
      <div class="box" onclick="select('${h}', 'Pitch 2', ${price}, this)">Pitch 2</div>
    </div>
  </div>`;
}

createSlots();

// SELECT
function select(time, pitch, price, el){
  let key = time+pitch;

  if(el.classList.contains("selected")){
    el.classList.remove("selected");
    selected = selected.filter(s=>s.key!==key);
  } else {
    el.classList.add("selected");
    selected.push({key,time,pitch,price});
  }

  update();
}

function clearAll(){
  selected = [];
  document.querySelectorAll(".box").forEach(b=>b.classList.remove("selected"));
  update();
}

// UPDATE BAR
function update(){
  let total = selected.reduce((s,x)=>s+x.price,0);
  document.getElementById("summary").innerText =
    `Selected ${selected.length} slots | Total ₹${total}`;
}

// WHATSAPP
function book(){
  if(selected.length===0){
    alert("Select your slot first");
    return;
  }

  // SORT BY TIME
  selected.sort((a,b)=> Number(a.time) - Number(b.time));

  let msg = "Booking Request:\n";

  selected.forEach(s=>{
    let timeFormatted = formatTime(s.time);
    let pitchShort = s.pitch === "Pitch 1" ? "P1" : "P2";

    msg += `${timeFormatted} (${pitchShort}) - ₹${s.price}\n`;
  });

  let total = selected.reduce((sum,s)=>sum+s.price,0);

  msg += `\nTotal Slots: ${selected.length}`;
  msg += `\nTotal Amount: ₹${total}`;

  // 🔥 NEW PROFESSIONAL LINE
  msg += `\n\nPlease confirm the booking.`;

  let url = "https://wa.me/919742595901?text=" + encodeURIComponent(msg);

  window.location.href = url;
}

</script>

</body>
</html>
